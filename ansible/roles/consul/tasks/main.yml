---

- name: Check if consul is already installed
  ansible.builtin.stat:
    path: "{{ consul_bin_path }}"
  register: consul_binary

- name: Download and install consul
  when: not consul_binary.stat.exists
  block:
    - name: Download consul
      become: true
      ansible.builtin.get_url:
        url: "{{ consul_download_url }}"
        dest: "/tmp/consul.zip"
        mode: '0644'

    - name: Unzip consul
      become: true
      ansible.builtin.unarchive:
        src: "/tmp/consul.zip"
        dest: "/usr/local/bin"
        remote_src: yes
        mode: '0755'

    - name: Remove consul zip file
      become: true
      ansible.builtin.file:
        path: "/tmp/consul.zip"
        state: absent

- name: Generate consul encryption key
  when: 
    - consul_encrypt_enable
    - consul_encrypt_key == ""
    - inventory_hostname == groups['servers'][0]
  block:
    - name: Generate encryption key
      ansible.builtin.command: "{{ consul_bin_path }} keygen"
      register: consul_keygen_output
      changed_when: false

    - name: Set encryption key fact
      ansible.builtin.set_fact:
        consul_encrypt_key: "{{ consul_keygen_output.stdout }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

- name: Create consul server configuration
  become: true
  ansible.builtin.template:
    src: consul-server.hcl.j2
    dest: "{{ consul_config_dir }}/consul.hcl"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: '0640'
  when: inventory_hostname in groups['servers']
  notify: restart consul

- name: Create consul client configuration
  become: true
  ansible.builtin.template:
    src: consul-client.hcl.j2
    dest: "{{ consul_config_dir }}/consul.hcl"
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: '0640'
  when: inventory_hostname in groups['clients']
  notify: restart consul

- name: Create consul systemd service
  become: true
  ansible.builtin.template:
    src: consul.service.j2
    dest: /etc/systemd/system/consul.service
    mode: '0644'
  notify:
    - reload systemd
    - restart consul

- name: Enable and start consul service
  become: true
  ansible.builtin.systemd:
    name: consul
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for consul to be ready
  ansible.builtin.wait_for:
    port: "{{ consul_port_http }}"
    delay: 5
    timeout: 60

- name: Bootstrap ACL system
  when:
    - consul_acl_enabled
    - inventory_hostname == groups['servers'][0]
  block:
    - name: Check if ACL is already bootstrapped
      ansible.builtin.command: "{{ consul_bin_path }} acl bootstrap"
      register: consul_acl_bootstrap
      failed_when: false
      changed_when: consul_acl_bootstrap.rc == 0

    - name: Parse bootstrap token from output
      when: consul_acl_bootstrap.rc == 0
      ansible.builtin.set_fact:
        consul_bootstrap_token: "{{ consul_acl_bootstrap.stdout | regex_search('SecretID:\\s+([a-f0-9-]+)', '\\1') | first }}"

    - name: Save bootstrap token to local file
      when: consul_acl_bootstrap.rc == 0
      ansible.builtin.copy:
        content: |
          Consul Bootstrap Token
          ======================
          {{ consul_acl_bootstrap.stdout }}
          
          SecretID (for easy access): {{ consul_bootstrap_token }}
        dest: "{{ playbook_dir }}/consul_bootstrap_token.txt"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Save bootstrap token SecretID only
      when: consul_acl_bootstrap.rc == 0
      ansible.builtin.copy:
        content: "{{ consul_bootstrap_token }}"
        dest: "{{ playbook_dir }}/consul_bootstrap_secret_id.txt"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Display Consul bootstrap token
      when: consul_acl_bootstrap.rc == 0
      ansible.builtin.debug:
        msg: |
          ========================================
          CONSUL BOOTSTRAP TOKEN
          ========================================
          SecretID: {{ consul_bootstrap_token }}
          
          Token saved to: {{ playbook_dir }}/consul_bootstrap_token.txt
          ========================================

    - name: Set bootstrap token as fact for all hosts
      when: consul_acl_bootstrap.rc == 0
      ansible.builtin.set_fact:
        consul_bootstrap_token: "{{ consul_bootstrap_token }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

- name: Read bootstrap token if already exists
  when:
    - consul_acl_enabled
    - inventory_hostname == groups['servers'][0]
    - consul_acl_bootstrap.rc != 0
  block:
    - name: Check if bootstrap token file exists locally
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/consul_bootstrap_secret_id.txt"
      register: bootstrap_token_file
      delegate_to: localhost
      become: false

    - name: Read existing bootstrap token
      when: bootstrap_token_file.stat.exists
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/consul_bootstrap_secret_id.txt"
      register: existing_token
      delegate_to: localhost
      become: false

    - name: Set bootstrap token from file
      when: bootstrap_token_file.stat.exists
      ansible.builtin.set_fact:
        consul_bootstrap_token: "{{ existing_token.content | b64decode | trim }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

- name: Delete anonymous token
  when:
    - consul_acl_enabled
    - inventory_hostname == groups['servers'][0]
    - consul_bootstrap_token is defined
  block:
    - name: Get anonymous token accessor ID
      ansible.builtin.command: >
        {{ consul_bin_path }} acl token read -id 00000000-0000-0000-0000-000000000002
      environment:
        CONSUL_HTTP_TOKEN: "{{ consul_bootstrap_token }}"
      register: anonymous_token_info
      failed_when: false
      changed_when: false

    - name: Delete anonymous token
      when: anonymous_token_info.rc == 0
      ansible.builtin.command: >
        {{ consul_bin_path }} acl token delete -id 00000000-0000-0000-0000-000000000002
      environment:
        CONSUL_HTTP_TOKEN: "{{ consul_bootstrap_token }}"
      register: delete_anonymous_result
      failed_when: false
      changed_when: delete_anonymous_result.rc == 0

    - name: Display anonymous token deletion result
      ansible.builtin.debug:
        msg: "Anonymous token deleted successfully"
      when: delete_anonymous_result.changed

    - name: Display message if anonymous token already deleted
      ansible.builtin.debug:
        msg: "Anonymous token does not exist or was already deleted"
      when: anonymous_token_info.rc != 0
