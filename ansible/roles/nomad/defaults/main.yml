---
# Nomad version and installation
nomad_version: "2.0.0"
nomad_architecture: "amd64"
nomad_download_url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_{{ nomad_architecture }}.zip"

# Nomad directories
nomad_bin_path: "/usr/local/bin/nomad"
nomad_config_dir: "/etc/nomad.d"
nomad_data_dir: "/opt/nomad/data"
nomad_plugin_dir: "/opt/nomad/plugins"

# Nomad user (runs as root for Docker access)
nomad_user: "root"
nomad_group: "root"

# Nomad configuration
nomad_datacenter: "dc1"
nomad_region: "global"
nomad_log_level: "INFO"

# Nomad ACL
nomad_acl_enabled: true

# Nomad Consul integration
nomad_consul_address: "127.0.0.1:8500"
nomad_consul_auto_advertise: true
nomad_consul_server_service_name: "nomad"
nomad_consul_server_auto_join: true
nomad_consul_client_service_name: "nomad-client"
nomad_consul_client_auto_join: true

# Nomad server configuration
nomad_server_enabled: false
nomad_server_bootstrap_expect: 3

# Nomad client configuration
nomad_client_enabled: false
nomad_client_network_interface: "{{ ansible_default_ipv4.interface }}"

# Docker driver configuration
nomad_docker_enabled: true
nomad_docker_volumes_enabled: true
nomad_docker_privileged_enabled: false

# CNI plugins
nomad_cni_plugins_url: "https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-amd64-v1.9.1.tgz"
nomad_cni_bin_dir: "/opt/cni/bin"

